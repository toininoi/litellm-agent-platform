<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>claude-tty POC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0b0c10; color: #d4d4d8; font: 13px ui-monospace, Menlo, Consolas, monospace; }
  header { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid #1f2229; font-size: 12px; color: #71717a; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; display: inline-block; }
  header .dot.ok { background: #10b981; }
  header .dot.err { background: #ef4444; }
  header b { color: #d4d4d8; font-weight: 600; }
  #term { height: calc(100% - 36px); padding: 8px 12px; }
  .xterm-viewport::-webkit-scrollbar { width: 8px; }
  .xterm-viewport::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <span class="dot" id="status-dot"></span>
  <b>claude-tty POC</b>
  <span id="status">connecting…</span>
  <span style="margin-left:auto" id="meta"></span>
</header>
<div id="term"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
  const status = document.getElementById('status');
  const dot = document.getElementById('status-dot');
  const meta = document.getElementById('meta');

  const term = new Terminal({
    fontFamily: 'ui-monospace, Menlo, Consolas, monospace',
    fontSize: 13,
    cursorBlink: true,
    theme: {
      background: '#0b0c10',
      foreground: '#d4d4d8',
      cursor: '#a78bfa',
      selectionBackground: '#3f3f46',
    },
    scrollback: 5000,
  });
  const fit = new FitAddon.FitAddon();
  const links = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fit);
  term.loadAddon(links);
  term.open(document.getElementById('term'));
  fit.fit();

  const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/tty';
  const ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    status.textContent = 'connected · ' + wsUrl;
    dot.classList.add('ok');
    // Send initial size so the PTY matches what xterm rendered
    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    fetch('/healthz').then(r => r.json()).then(d => {
      meta.textContent = 'cmd=' + d.cmd + ' · cwd=' + d.repo;
    }).catch(() => {});
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') term.write(e.data);
    else term.write(new Uint8Array(e.data));
  };

  ws.onclose = () => {
    status.textContent = 'disconnected';
    dot.classList.remove('ok');
    dot.classList.add('err');
    term.write('\r\n\x1b[2m[ws closed]\x1b[0m\r\n');
  };

  ws.onerror = (e) => {
    status.textContent = 'error';
    dot.classList.add('err');
  };

  term.onData((d) => {
    if (ws.readyState === WebSocket.OPEN) ws.send(d);
  });

  // Keep PTY size in sync with the viewport.
  function sendResize() {
    fit.fit();
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }
  }
  window.addEventListener('resize', sendResize);
  // Run once after layout settles
  requestAnimationFrame(sendResize);
</script>
</body>
</html>
